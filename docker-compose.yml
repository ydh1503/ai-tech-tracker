services:
  postgres:
    image: postgres:17-alpine
    container_name: ai_tracker_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password_2026
      POSTGRES_DB: ai_tech_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_tracker_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_tracker_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:dev_password_2026@postgres:5432/ai_tech_tracker
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 빌드 시 번들에 포함될 클라이언트 사이드 URL (브라우저 → 호스트 포트 포워딩)
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: ai_tracker_frontend
    ports:
      - "3000:3000"
    environment:
      # 런타임 서버 사이드 URL (Next.js 서버 → backend 컨테이너 내부 통신)
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
